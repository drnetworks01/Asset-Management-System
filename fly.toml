# =====================================================================
# Fly.io app configuration for Kurikara Assets
# Run `flyctl launch --no-deploy --copy-config` to register the app,
# then `flyctl deploy` to ship.
# =====================================================================

app = "kurikara-assets"
primary_region = "sin"          # Singapore — closest free region to Sri Lanka
kill_signal     = "SIGINT"
kill_timeout    = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT                  = "3010"
  HOSTNAME              = "0.0.0.0"
  NODE_ENV              = "production"
  DATABASE_FILE         = "/app/data/kurikara.db"
  NEXT_TELEMETRY_DISABLED = "1"

# Persistent volume — survives restarts and redeploys.
# Holds the SQLite DB + uploaded photos + import-wizard temp files.
[mounts]
  source      = "kurikara_data"
  destination = "/app/data"

[http_service]
  internal_port      = 3010
  force_https        = true
  auto_stop_machines = "stop"     # Free-tier friendly: stops machine on idle
  auto_start_machines = true      # Cold-starts in ~2-3 s on next request
  min_machines_running = 0
  processes          = ["app"]

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    grace_period  = "30s"
    interval      = "30s"
    method        = "GET"
    path          = "/login"
    protocol      = "http"
    timeout       = "5s"

[[vm]]
  size       = "shared-cpu-1x"
  memory_mb  = 512                 # 512 MB is plenty for SQLite + Next
  cpu_kind   = "shared"
  cpus       = 1

# Secrets are set via `flyctl secrets set` — DO NOT put SESSION_PASSWORD,
# OPENROUTER_API_KEY, etc. in this file (it's committed to git).

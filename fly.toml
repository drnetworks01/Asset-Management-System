# fly.toml app configuration file generated for kurikara-assets on 2026-05-19T14:53:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kurikara-assets'
primary_region = 'sin'
kill_signal = 'SIGINT'
kill_timeout = '30s'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_FILE = '/app/data/kurikara.db'
  HOSTNAME = '0.0.0.0'
  NEXT_TELEMETRY_DISABLED = '1'
  NODE_ENV = 'production'
  PORT = '3010'

[[mounts]]
  source = 'kurikara_data'
  destination = '/app/data'

[http_service]
  internal_port = 3010
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/login'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
